<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymTracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede8;
      --text: #1a1a1a; --text2: #5f5e5a; --text3: #888780;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --blue: #185FA5; --blue-light: #E6F1FB; --blue-text: #0C447C;
      --green: #1D9E75; --red: #A32D2D; --red-light: #FCEBEB;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
        --text: #f0efe8; --text2: #b4b2a9; --text3: #888780;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --blue-light: #0c2a4a; --blue-text: #85b7eb;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem; min-height: 100vh; background: var(--bg3); }
    .screen { display: none; }
    .screen.active { display: block; }
    .nav { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.5rem; }
    .nav-btn { flex: 1; padding: 8px 4px; border: none; background: transparent; border-radius: var(--radius); font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .nav-btn.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
    input[type=text], input[type=number], input[type=email], input[type=password], input[type=date], select {
      width: 100%; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
    }
    input:focus, select:focus { border-color: var(--blue); }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
    .btn { padding: 10px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn:hover { background: var(--bg2); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--blue); color: #B5D4F4; border-color: var(--blue); }
    .btn-primary:hover { background: #378ADD; border-color: #378ADD; }
    .btn-danger { color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: var(--red-light); }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn-full { width: 100%; }
    .exercise-row { display: grid; grid-template-columns: 1fr 64px 64px 64px 32px; gap: 6px; align-items: center; margin-bottom: 8px; }
    .exercise-row input { padding: 6px 8px; font-size: 13px; }
    .ex-header { display: grid; grid-template-columns: 1fr 64px 64px 64px 32px; gap: 6px; margin-bottom: 4px; }
    .ex-label { font-size: 11px; color: var(--text3); text-align: center; }
    .workout-card { cursor: pointer; transition: border-color 0.15s; }
    .workout-card:hover { border-color: var(--border2); }
    .workout-title { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
    .workout-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; background: var(--blue-light); color: var(--blue-text); margin-right: 4px; margin-top: 4px; }
    .chart-wrap { position: relative; height: 220px; margin: 1rem 0; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
    .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 10; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .detail-table th { text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); padding: 4px 0 8px; border-bottom: 0.5px solid var(--border); }
    .detail-table td { padding: 6px 0; border-bottom: 0.5px solid var(--border); }
    .section-title { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin: 1.5rem 0 0.5rem; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .delete-x { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: var(--radius); line-height: 1; }
    .delete-x:hover { background: var(--red-light); color: var(--red); }
    .error-msg { font-size: 13px; color: var(--red); margin-top: 8px; text-align: center; }
    .success-msg { font-size: 13px; color: var(--green); margin-top: 8px; text-align: center; }
    .auth-wrap { max-width: 360px; margin: 3rem auto; }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
    .auth-header p { font-size: 13px; color: var(--text2); }
    .auth-tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: var(--radius); font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .auth-tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .user-badge { font-size: 12px; padding: 4px 12px; border-radius: 99px; background: var(--blue-light); color: var(--blue-text); font-weight: 500; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(181,212,244,0.4); border-top-color: #B5D4F4; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .companion-badge { font-size: 11px; color: var(--blue); background: var(--blue-light); padding: 1px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  </style>
</head>
<body>
<div class="app">

  <!-- AUTH -->
  <div id="screen-auth" class="screen active">
    <div class="auth-wrap">
      <div class="auth-header">
        <h1>GymTracker</h1>
        <p>Registra tu progreso</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Registrarse</button>
      </div>
      <div class="card">
        <div id="auth-register-fields" style="display:none;">
          <label>Nombre de usuario</label>
          <input type="text" id="reg-username" placeholder="ej: carlos" autocomplete="off" />
        </div>
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="tu@email.com" autocomplete="email" />
        <label>Contraseña</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn btn-primary btn-full" style="margin-top:16px;" id="auth-btn" onclick="handleAuth()">Entrar</button>
        <div id="auth-error" class="error-msg"></div>
        <div id="auth-success" class="success-msg"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="screen">
    <div class="topbar">
      <span class="user-badge" id="user-badge">...</span>
      <button class="btn btn-sm btn-danger" onclick="logout()">Cerrar sesión</button>
    </div>
    <div class="nav">
      <button class="nav-btn active" id="nav-registro" onclick="showTab('registro')">+ Registrar</button>
      <button class="nav-btn" id="nav-historial" onclick="showTab('historial')">Historial</button>
      <button class="nav-btn" id="nav-progreso" onclick="showTab('progreso')">Progreso</button>
    </div>

    <!-- REGISTRO -->
    <div id="tab-registro">
      <div class="card">
        <label>Nombre del entrenamiento</label>
        <input type="text" id="workout-name" placeholder="Ej: Pierna, Pecho/Tríceps..." />
        <label>Fecha</label>
        <input type="date" id="workout-date" />
      </div>
      <p class="section-title">Ejercicios</p>
      <div id="exercises-container"></div>
      <button class="btn btn-full" onclick="addExercise()" style="margin-bottom:1rem;">+ Añadir ejercicio</button>
      <button class="btn btn-primary btn-full" id="save-btn" onclick="saveWorkout()">Guardar entrenamiento</button>
      <div id="save-msg" class="success-msg" style="display:none;">Guardado correctamente</div>
      <div id="save-error" class="error-msg" style="display:none;"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="tab-historial" style="display:none;">
      <div class="flex-between" style="margin-bottom:1rem;">
        <span style="font-size:13px;color:var(--text2);" id="history-count"></span>
        <select id="history-filter" onchange="renderHistory()" style="width:auto;font-size:12px;padding:6px 8px;">
          <option value="all">Todos</option>
          <option value="mine">Solo yo</option>
        </select>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- PROGRESO -->
    <div id="tab-progreso" style="display:none;">
      <div class="stats-grid" id="stats-grid"></div>
      <p class="section-title">Evolución de peso por ejercicio</p>
      <div class="card" style="padding:1rem;">
        <div style="display:flex;gap:8px;margin-bottom:1rem;">
          <select id="progress-exercise" onchange="updateChart()" style="flex:1;">
            <option value="">Selecciona ejercicio</option>
          </select>
          <select id="progress-user-filter" onchange="updateChart()" style="width:auto;">
            <option value="all">Todos</option>
            <option value="mine">Solo yo</option>
          </select>
        </div>
        <div class="chart-wrap"><canvas id="progress-chart"></canvas></div>
        <div id="chart-empty" class="empty" style="display:none;">Sin datos para este ejercicio</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="detail-modal" onclick="closeModal(event)">
  <div class="modal" id="detail-content"></div>
</div>

<script>
const SUPA_URL = 'https://oxssmfsmnqtexaushoeq.supabase.co';
const SUPA_KEY = 'sb_publishable_6OQBUpCEp4dJvBxMbFKtBw_FW94KXyS';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null, currentUsername = '', workouts = [], exerciseCount = 0, chartInstance = null, authMode = 'login';

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await onLogin(session.user);
}

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('auth-register-fields').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Entrar' : 'Crear cuenta';
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-success').textContent = '';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const sucEl = document.getElementById('auth-success');
  const btn = document.getElementById('auth-btn');
  errEl.textContent = ''; sucEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Rellena email y contraseña'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>' + (authMode==='login' ? 'Entrando...' : 'Creando cuenta...');
  if (authMode === 'register') {
    const username = document.getElementById('reg-username').value.trim();
    if (!username) { errEl.textContent = 'Pon un nombre de usuario'; btn.disabled=false; btn.textContent='Crear cuenta'; return; }
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { errEl.textContent = error.message; btn.disabled=false; btn.textContent='Crear cuenta'; return; }
    if (data.user) await sb.from('profiles').insert({ id: data.user.id, username });
    sucEl.textContent = '¡Cuenta creada! Ya puedes entrar.';
    btn.disabled=false; btn.textContent='Crear cuenta';
    switchAuthTab('login');
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = 'Email o contraseña incorrectos'; btn.disabled=false; btn.textContent='Entrar'; return; }
    await onLogin(data.user);
  }
}

async function onLogin(user) {
  currentUser = user;
  const { data: profile } = await sb.from('profiles').select('username').eq('id', user.id).single();
  currentUsername = profile?.username || user.email;
  document.getElementById('user-badge').textContent = currentUsername;
  document.getElementById('screen-auth').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
  addExercise(); addExercise();
  await loadWorkouts();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; workouts = [];
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-auth').classList.add('active');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  document.getElementById('exercises-container').innerHTML = '';
  exerciseCount = 0;
}

async function loadWorkouts() {
  const { data, error } = await sb.from('workouts').select('*').order('date', { ascending: false });
  if (!error) workouts = data || [];
}

function showTab(name) {
  ['registro','historial','progreso'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
    document.getElementById('nav-'+t).classList.toggle('active', t===name);
  });
  if (name==='historial') renderHistory();
  if (name==='progreso') renderProgress();
}

function addExercise(data) {
  exerciseCount++;
  const id = exerciseCount;
  const div = document.createElement('div');
  div.className = 'card'; div.id = 'ex-' + id;
  div.innerHTML = `
    <div class="flex-between" style="margin-bottom:8px;">
      <input type="text" placeholder="Nombre del ejercicio" id="ex-name-${id}" style="flex:1;margin-right:8px;" value="${data?data.name:''}">
      <button class="delete-x" onclick="document.getElementById('ex-${id}').remove()">×</button>
    </div>
    <div class="ex-header">
      <span class="ex-label" style="text-align:left;">Serie</span>
      <span class="ex-label">Reps</span><span class="ex-label">Peso kg</span><span class="ex-label">RIR</span><span></span>
    </div>
    <div id="sets-${id}"></div>
    <button class="btn btn-sm" onclick="addSet(${id})" style="margin-top:6px;">+ Serie</button>
  `;
  document.getElementById('exercises-container').appendChild(div);
  if (data && data.sets) data.sets.forEach(s => addSet(id, s));
  else addSet(id);
}

function addSet(exId, data) {
  const container = document.getElementById('sets-'+exId);
  const n = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'exercise-row';
  row.innerHTML = `
    <span style="font-size:13px;color:var(--text2);">Serie ${n}</span>
    <input type="number" placeholder="—" min="1" id="reps-${exId}-${n}" value="${data?data.reps:''}">
    <input type="number" placeholder="—" min="0" step="0.5" id="weight-${exId}-${n}" value="${data?data.weight:''}">
    <input type="number" placeholder="—" min="0" max="10" id="rir-${exId}-${n}" value="${data?(data.rir||''):''}">
    <button class="delete-x" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(row);
}

async function saveWorkout() {
  const name = document.getElementById('workout-name').value.trim() || 'Entrenamiento';
  const date = document.getElementById('workout-date').value || new Date().toISOString().split('T')[0];
  const exercises = [];
  document.querySelectorAll('#exercises-container .card').forEach(card => {
    const id = card.id.replace('ex-','');
    const exName = document.getElementById('ex-name-'+id)?.value.trim();
    if (!exName) return;
    const sets = [];
    card.querySelectorAll('.exercise-row').forEach((row, i) => {
      const n = i+1;
      const reps = document.getElementById(`reps-${id}-${n}`)?.value;
      const weight = document.getElementById(`weight-${id}-${n}`)?.value;
      const rir = document.getElementById(`rir-${id}-${n}`)?.value;
      if (reps||weight) sets.push({reps:reps||'',weight:weight||'',rir:rir||''});
    });
    if (sets.length) exercises.push({name:exName, sets});
  });
  if (!exercises.length) {
    document.getElementById('save-error').style.display='block';
    document.getElementById('save-error').textContent='Añade al menos un ejercicio con datos';
    return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Guardando...';
  const { error } = await sb.from('workouts').insert({ user_id: currentUser.id, name, date, exercises });
  btn.disabled=false; btn.textContent='Guardar entrenamiento';
  if (error) {
    document.getElementById('save-error').style.display='block';
    document.getElementById('save-error').textContent='Error: '+error.message;
    return;
  }
  document.getElementById('save-error').style.display='none';
  document.getElementById('exercises-container').innerHTML='';
  document.getElementById('workout-name').value='';
  exerciseCount=0; addExercise(); addExercise();
  const msg = document.getElementById('save-msg');
  msg.style.display='block'; setTimeout(()=>msg.style.display='none', 2500);
  await loadWorkouts();
}

function renderHistory() {
  const filter = document.getElementById('history-filter').value;
  const filtered = filter==='mine' ? workouts.filter(w=>w.user_id===currentUser.id) : workouts;
  document.getElementById('history-count').textContent = filtered.length + ' entrenamientos';
  const list = document.getElementById('history-list');
  if (!filtered.length) { list.innerHTML='<div class="empty">Aún no hay entrenamientos</div>'; return; }
  list.innerHTML = filtered.map(w => {
    const isMe = w.user_id === currentUser.id;
    const totalSets = w.exercises.reduce((a,e)=>a+e.sets.length,0);
    return `<div class="card workout-card" onclick="showDetail('${w.id}')">
      <div class="flex-between">
        <div class="workout-title">${w.name}${!isMe?'<span class="companion-badge">compañero</span>':''}</div>
        ${isMe?`<button class="btn btn-sm btn-danger" onclick="deleteWorkout(event,'${w.id}')">Borrar</button>`:''}
      </div>
      <div class="workout-meta">${formatDate(w.date)} · ${w.exercises.length} ejercicios · ${totalSets} series</div>
      <div>${w.exercises.slice(0,4).map(e=>`<span class="tag">${e.name}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

async function deleteWorkout(event, id) {
  event.stopPropagation();
  if (!confirm('¿Borrar este entrenamiento?')) return;
  await sb.from('workouts').delete().eq('id', id);
  await loadWorkouts(); renderHistory();
}

function showDetail(id) {
  const w = workouts.find(x=>String(x.id)===String(id));
  if (!w) return;
  const isMe = w.user_id === currentUser.id;
  document.getElementById('detail-content').innerHTML = `
    <div class="flex-between" style="margin-bottom:1rem;">
      <div style="font-size:16px;font-weight:500;">${w.name}${!isMe?'<span class="companion-badge">compañero</span>':''}</div>
      <button class="btn btn-sm" onclick="closeModal()">×</button>
    </div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">${formatDate(w.date)}</div>
    ${w.exercises.map(e=>`
      <p style="font-weight:500;font-size:14px;margin:12px 0 6px;">${e.name}</p>
      <table class="detail-table">
        <thead><tr><th>Serie</th><th>Reps</th><th>Peso (kg)</th><th>RIR</th></tr></thead>
        <tbody>${e.sets.map((s,j)=>`<tr><td>${j+1}</td><td>${s.reps||'—'}</td><td>${s.weight||'—'}</td><td>${s.rir||'—'}</td></tr>`).join('')}</tbody>
      </table>
    `).join('')}
    ${isMe?`<button class="btn btn-full" style="margin-top:1.5rem;" onclick="loadToEdit('${w.id}');closeModal()">Editar este entrenamiento</button>`:''}
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal(event) {
  if (!event || event.target===document.getElementById('detail-modal'))
    document.getElementById('detail-modal').classList.remove('open');
}

function loadToEdit(id) {
  const w = workouts.find(x=>String(x.id)===String(id));
  if (!w) return;
  showTab('registro');
  document.getElementById('workout-name').value = w.name;
  document.getElementById('workout-date').value = w.date;
  document.getElementById('exercises-container').innerHTML='';
  exerciseCount=0;
  w.exercises.forEach(e => addExercise(e));
}

function renderProgress() {
  const mine = workouts.filter(w=>w.user_id===currentUser.id);
  const allEx = [...new Set(workouts.flatMap(w=>w.exercises.map(e=>e.name)))].sort();
  document.getElementById('progress-exercise').innerHTML =
    '<option value="">Selecciona ejercicio</option>' + allEx.map(e=>`<option value="${e}">${e}</option>`).join('');
  const totalSets = mine.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.length,0),0);
  const allWeights = mine.flatMap(w=>w.exercises.flatMap(e=>e.sets.map(s=>parseFloat(s.weight)||0))).filter(x=>x>0);
  const maxW = allWeights.length ? Math.max(...allWeights) : 0;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Mis entrenamientos</div><div class="stat-value">${mine.length}</div></div>
    <div class="stat-card"><div class="stat-label">Mis series totales</div><div class="stat-value">${totalSets}</div></div>
    <div class="stat-card"><div class="stat-label">Ejercicios distintos</div><div class="stat-value">${allEx.length}</div></div>
    <div class="stat-card"><div class="stat-label">Mi peso máx. (kg)</div><div class="stat-value">${maxW}</div></div>
  `;
  updateChart();
}

function updateChart() {
  const exName = document.getElementById('progress-exercise').value;
  const userFilter = document.getElementById('progress-user-filter').value;
  const ctx = document.getElementById('progress-chart');
  const empty = document.getElementById('chart-empty');
  if (chartInstance) { chartInstance.destroy(); chartInstance=null; }
  if (!exName) { ctx.style.display='none'; empty.style.display='none'; return; }
  const filtered = userFilter==='mine' ? workouts.filter(w=>w.user_id===currentUser.id) : workouts;
  const points = [];
  filtered.slice().reverse().forEach(w => {
    w.exercises.filter(e=>e.name===exName).forEach(e => {
      const ws = e.sets.map(s=>parseFloat(s.weight)||0).filter(x=>x>0);
      if (ws.length) points.push({date:w.date, max:Math.max(...ws), isMe:w.user_id===currentUser.id});
    });
  });
  if (!points.length) { ctx.style.display='none'; empty.style.display='block'; return; }
  ctx.style.display='block'; empty.style.display='none';
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  chartInstance = new Chart(ctx, {
    type:'line',
    data:{
      labels: points.map(d=>formatDate(d.date)),
      datasets:[{
        label:'Peso máx. (kg)',
        data: points.map(d=>d.max),
        borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.1)',
        pointBackgroundColor: points.map(d=>d.isMe?'#185FA5':'#1D9E75'),
        tension:0.3, fill:true, pointRadius:5
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{color:isDark?'#B4B2A9':'#5F5E5A',font:{size:11}}, grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'} },
        y:{ ticks:{color:isDark?'#B4B2A9':'#5F5E5A',font:{size:11}}, grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'}, beginAtZero:false }
      }
    }
  });
}

init();
</script>
</body>
</html>
