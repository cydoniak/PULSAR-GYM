<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #1a3bcc;
      --blue-dark:  #1230aa;
      --blue-deep:  #0d2080;
      --blue-light: #e8edff;
      --blue-mid:   #c0caff;
      --blue-dim:   rgba(26,59,204,0.08);
      --blue-dim2:  rgba(26,59,204,0.14);
      --white:      #ffffff;
      --off:        #f4f5fb;
      --gray:       #6b7280;
      --gray2:      #9ca3af;
      --gray3:      #d1d5db;
      --text:       #0f172a;
      --text2:      #374151;
      --border:     #e2e6f0;
      --border2:    #c7cde0;
      --red:        #dc2626;
      --red-dim:    #fef2f2;
      --green:      #16a34a;
      --orange:     #ea580c;
      --orange-dim: #fff7ed;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }
    html { background: var(--off); }
    body { font-family: var(--font-body); background: var(--off); color: var(--text); min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 4rem; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* TOPBAR */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem; padding: 0.75rem 1rem;
      background: var(--blue); border-radius: 12px;
    }
    .logo { font-family: var(--font-display); font-size: 26px; letter-spacing: 3px; color: #fff; line-height: 1; }
    .user-pill {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 10px 4px 7px; border-radius: 99px;
    }
    .user-dot { width: 7px; height: 7px; border-radius: 50%; background: #7ee8a2; }
    .user-name { font-size: 12px; font-weight: 500; color: #fff; font-family: var(--font-mono); }
    .btn-logout {
      font-size: 11px; font-family: var(--font-mono); color: rgba(255,255,255,0.6);
      background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
      padding: 4px 10px; cursor: pointer; margin-left: 6px; transition: all 0.15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* NAV */
    .nav { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 1.5rem; }
    .nav-btn {
      padding: 10px 4px; border: 1.5px solid var(--border2);
      background: var(--white); border-radius: 8px;
      font-family: var(--font-display); font-size: 16px; letter-spacing: 1.5px;
      color: var(--gray); cursor: pointer; transition: all 0.15s;
    }
    .nav-btn:hover { border-color: var(--blue); color: var(--blue); }
    .nav-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* CARDS */
    .card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }

    /* CATEGORIA SELECTOR */
    .cat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 4px; }
    .cat-btn {
      padding: 12px 8px; border: 1.5px solid var(--border2);
      background: var(--white); border-radius: 10px;
      font-family: var(--font-display); font-size: 17px; letter-spacing: 1px;
      color: var(--gray); cursor: pointer; transition: all 0.15s;
      text-align: center; line-height: 1.2;
    }
    .cat-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
    .cat-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .cat-btn.cardio-btn { grid-column: 1 / -1; }
    .cat-btn.cardio-btn.active { background: var(--orange); border-color: var(--orange); }
    .cat-btn.cardio-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .cat-icon { font-size: 18px; display: block; margin-bottom: 3px; }
    .cat-label-sm { font-size: 10px; font-family: var(--font-mono); color: inherit; opacity: 0.7; display: block; font-weight: 400; letter-spacing: 0; text-transform: none; font-family: var(--font-mono); }

    /* INPUTS */
    input[type=text], input[type=number], input[type=email],
    input[type=password], input[type=date], input[type=range], select, textarea {
      width: 100%; padding: 9px 12px;
      background: var(--off); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; font-family: var(--font-body); outline: none;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); background: var(--white); }
    input::placeholder, textarea::placeholder { color: var(--gray2); }
    select option { background: var(--white); }
    label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.09em;
      color: var(--gray); display: block; margin-bottom: 5px; margin-top: 14px; text-transform: uppercase;
    }

    /* INTENSIDAD SLIDER */
    .intensity-wrap { margin-top: 14px; }
    .intensity-track { position: relative; margin-top: 8px; }
    input[type=range] {
      padding: 0; height: 4px; border-radius: 2px; cursor: pointer;
      accent-color: var(--blue);
    }
    .intensity-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .intensity-labels span { font-size: 10px; color: var(--gray2); font-family: var(--font-mono); }
    .intensity-value {
      font-family: var(--font-display); font-size: 32px; color: var(--blue);
      text-align: center; line-height: 1; margin-top: 8px;
    }
    .intensity-desc { font-size: 11px; color: var(--gray); font-family: var(--font-mono); text-align: center; margin-top: 2px; }

    /* DURACION */
    .duracion-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* BUTTONS */
    .btn {
      padding: 10px 16px; border: 1.5px solid var(--border2);
      border-radius: 8px; background: var(--white);
      color: var(--text2); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font-body); transition: all 0.15s;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: var(--blue); color: #fff; border-color: var(--blue);
      font-family: var(--font-display); font-size: 17px;
      letter-spacing: 1.5px; padding: 12px 16px; font-weight: 400;
    }
    .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: #fff; }
    .btn-primary.cardio { background: var(--orange); border-color: var(--orange); }
    .btn-primary.cardio:hover { background: #c2410c; border-color: #c2410c; }
    .btn-danger { color: var(--red); border-color: transparent; background: transparent; }
    .btn-danger:hover { background: var(--red-dim); border-color: transparent; color: var(--red); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-full { width: 100%; }
    .btn-ghost { background: transparent; border: 1.5px dashed var(--border2); color: var(--gray); font-size: 13px; }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

    /* SECTION TITLE */
    .section-title {
      font-family: var(--font-display); font-size: 22px; letter-spacing: 2px;
      color: var(--blue); margin: 1.5rem 0 0.75rem;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, var(--blue-mid), transparent); border-radius: 1px; }

    /* EXERCISE BUILDER */
    .ex-name-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .ex-name-row input { flex: 1; }
    .sets-header { display: grid; grid-template-columns: 34px 1fr 1fr 1fr 28px; gap: 6px; margin-bottom: 6px; }
    .sets-header span { font-size: 10px; font-weight: 600; color: var(--gray2); text-transform: uppercase; letter-spacing: 0.06em; text-align: center; }
    .set-row { display: grid; grid-template-columns: 34px 1fr 1fr 1fr 28px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .set-row input { padding: 7px 6px; font-size: 13px; text-align: center; font-family: var(--font-mono); }
    .set-num {
      font-family: var(--font-mono); font-size: 11px; color: var(--blue);
      text-align: center; background: var(--blue-dim);
      border: 1.5px solid var(--blue-mid); border-radius: 6px; padding: 7px 0; font-weight: 500;
    }
    .delete-x { background: none; border: none; color: var(--gray2); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; line-height: 1; transition: all 0.1s; }
    .delete-x:hover { background: var(--red-dim); color: var(--red); }

    /* HISTORY CARDS */
    .workout-card { cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
    .workout-card:hover { border-color: var(--blue-mid); box-shadow: 0 2px 12px var(--blue-dim2); }
    .workout-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .workout-card-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; color: var(--text); line-height: 1.1; }
    .workout-meta { font-size: 11px; color: var(--gray); font-family: var(--font-mono); margin-bottom: 10px; }
    .tag { display: inline-block; padding: 3px 9px; background: var(--blue-light); color: var(--blue-dark); border-radius: 5px; font-size: 11px; font-family: var(--font-mono); margin-right: 5px; margin-top: 4px; }
    .tag-cardio { background: var(--orange-dim); color: var(--orange); }
    .companion-badge { font-size: 10px; font-family: var(--font-mono); color: var(--blue); background: var(--blue-light); border: 1px solid var(--blue-mid); padding: 2px 7px; border-radius: 4px; margin-left: 7px; vertical-align: middle; }
    .cat-badge {
      display: inline-block; font-size: 10px; font-family: var(--font-mono);
      padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; font-weight: 500;
    }
    .cat-badge-fuerza { background: var(--blue-light); color: var(--blue-dark); }
    .cat-badge-cardio { background: var(--orange-dim); color: var(--orange); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .stat-card { background: var(--blue); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; bottom: -24px; right: -24px; width: 90px; height: 90px; background: rgba(255,255,255,0.07); border-radius: 50%; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-family: var(--font-display); font-size: 38px; color: #fff; line-height: 1; }
    .stat-unit { font-size: 14px; color: rgba(255,255,255,0.5); margin-left: 2px; }

    /* CHART */
    .chart-wrap { position: relative; height: 220px; margin: 0.5rem 0; }
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--gray2); font-size: 13px; font-family: var(--font-mono); }

    /* MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 100; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-bg.open { display: flex; }
    .modal { background: var(--white); border: 1.5px solid var(--border); border-radius: 20px 20px 0 0; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; animation: slideUp 0.22s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 1.5px; color: var(--blue); margin-bottom: 4px; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--font-mono); margin-top: 8px; }
    .detail-table th { text-align: left; font-size: 10px; font-weight: 600; color: var(--gray); padding: 4px 0 8px; border-bottom: 1.5px solid var(--border); letter-spacing: 0.06em; text-transform: uppercase; }
    .detail-table td { padding: 7px 0; border-bottom: 1px solid var(--border); }
    .ex-section-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--blue); margin: 16px 0 6px; }
    .cardio-detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 12px 0; }
    .cardio-detail-box { background: var(--off); border-radius: 8px; padding: 12px; text-align: center; }
    .cardio-detail-label { font-size: 10px; color: var(--gray); font-family: var(--font-mono); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .cardio-detail-val { font-family: var(--font-display); font-size: 24px; color: var(--orange); line-height: 1; }

    /* AUTH */
    .auth-wrap { max-width: 360px; margin: 2rem auto; }
    .auth-hero { background: var(--blue); border-radius: 16px; padding: 2rem 1.5rem; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
    .auth-hero::before { content: 'GT'; font-family: var(--font-display); font-size: 160px; color: rgba(255,255,255,0.05); position: absolute; right: -20px; top: -30px; line-height: 1; pointer-events: none; }
    .auth-logo { font-family: var(--font-display); font-size: 52px; letter-spacing: 4px; color: #fff; line-height: 1; }
    .auth-sub { font-size: 12px; color: rgba(255,255,255,0.55); font-family: var(--font-mono); margin-top: 8px; }
    .auth-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .auth-tab { flex: 1; padding: 9px; background: var(--white); border: 1.5px solid var(--border2); border-radius: 8px; font-family: var(--font-display); font-size: 16px; letter-spacing: 1px; color: var(--gray); cursor: pointer; transition: all 0.15s; }
    .auth-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .error-msg { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; font-family: var(--font-mono); }
    .success-msg { font-size: 12px; color: var(--green); margin-top: 10px; text-align: center; font-family: var(--font-mono); }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
<div class="app">

  <!-- AUTH -->
  <div id="screen-auth" class="screen active">
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="auth-logo">GYM<br>TRACKER</div>
        <div class="auth-sub">// registra tu progreso</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">ENTRAR</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">REGISTRO</button>
      </div>
      <div class="card">
        <div id="auth-register-fields" style="display:none;">
          <label>Usuario</label>
          <input type="text" id="reg-username" placeholder="ej: carlos" autocomplete="off" />
        </div>
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="tu@email.com" autocomplete="email" />
        <label>Contraseña</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn btn-primary btn-full" style="margin-top:16px;" id="auth-btn" onclick="handleAuth()">ENTRAR</button>
        <div id="auth-error" class="error-msg"></div>
        <div id="auth-success" class="success-msg"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="screen">
    <div class="topbar">
      <div class="logo">GT</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="user-pill">
          <div class="user-dot"></div>
          <span class="user-name" id="user-badge">...</span>
        </div>
        <button class="btn-logout" onclick="logout()">salir</button>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn active" id="nav-registro" onclick="showTab('registro')">+ LOG</button>
      <button class="nav-btn" id="nav-historial" onclick="showTab('historial')">HIST</button>
      <button class="nav-btn" id="nav-progreso" onclick="showTab('progreso')">STATS</button>
    </div>

    <!-- REGISTRO -->
    <div id="tab-registro">
      <div class="section-title">Tipo de sesión</div>

      <div class="cat-grid" id="cat-grid">
        <button class="cat-btn" data-cat="Empujes" onclick="selectCat('Empujes')">
          <span class="cat-icon">🏋️</span>EMPUJES
          <span class="cat-label-sm">pecho · hombro · tríceps</span>
        </button>
        <button class="cat-btn" data-cat="Tirones" onclick="selectCat('Tirones')">
          <span class="cat-icon">💪</span>TIRONES
          <span class="cat-label-sm">espalda · bíceps</span>
        </button>
        <button class="cat-btn" data-cat="Pierna" onclick="selectCat('Pierna')">
          <span class="cat-icon">🦵</span>PIERNA
          <span class="cat-label-sm">cuádriceps · femoral · glúteo</span>
        </button>
        <button class="cat-btn" data-cat="Torso" onclick="selectCat('Torso')">
          <span class="cat-icon">🔥</span>TORSO
          <span class="cat-label-sm">pecho · espalda · hombros</span>
        </button>
        <button class="cat-btn cardio-btn" data-cat="Cardio" onclick="selectCat('Cardio')">
          <span class="cat-icon">🏃</span>CARDIO
          <span class="cat-label-sm">intensidad · duración · notas</span>
        </button>
      </div>

      <div class="card" style="margin-top:4px;">
        <label>Fecha</label>
        <input type="date" id="workout-date" />
        <label>Notas (opcional)</label>
        <textarea id="workout-notes" placeholder="Ej: me sentí fuerte hoy..." rows="2" style="resize:none;"></textarea>
      </div>

      <!-- FUERZA FORM -->
      <div id="fuerza-form" style="display:none;">
        <div class="section-title">Ejercicios</div>
        <div id="exercises-container"></div>
        <button class="btn btn-ghost btn-full" onclick="addExercise()" style="margin-bottom:1rem;">+ AÑADIR EJERCICIO</button>
        <button class="btn btn-primary btn-full" id="save-btn" onclick="saveWorkout()">GUARDAR SESIÓN</button>
      </div>

      <!-- CARDIO FORM -->
      <div id="cardio-form" style="display:none;">
        <div class="section-title">Cardio</div>
        <div class="card">
          <label>Tipo de cardio</label>
          <select id="cardio-tipo">
            <option value="">Selecciona tipo...</option>
            <option>Correr</option>
            <option>Bicicleta</option>
            <option>Elíptica</option>
            <option>Remo</option>
            <option>Saltar a la comba</option>
            <option>HIIT</option>
            <option>Caminar</option>
            <option>Natación</option>
            <option>Otro</option>
          </select>

          <div class="duracion-row" style="margin-top:14px;">
            <div>
              <label>Duración (min)</label>
              <input type="number" id="cardio-duracion" placeholder="45" min="1" max="300" />
            </div>
            <div>
              <label>Distancia (km)</label>
              <input type="number" id="cardio-distancia" placeholder="5.0" step="0.1" min="0" />
            </div>
          </div>

          <div class="intensity-wrap">
            <label>Intensidad</label>
            <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
              <input type="range" id="cardio-intensidad" min="1" max="10" value="5" oninput="updateIntensity(this.value)" style="flex:1;border:none;background:transparent;padding:0;" />
              <div style="min-width:48px;text-align:right;">
                <span class="intensity-value" id="intensity-val">5</span>
              </div>
            </div>
            <div class="intensity-labels">
              <span>suave</span><span>moderado</span><span>máximo</span>
            </div>
            <div class="intensity-desc" id="intensity-desc">// moderado</div>
          </div>
        </div>
        <button class="btn btn-primary cardio btn-full" id="save-cardio-btn" onclick="saveWorkout()">GUARDAR CARDIO</button>
      </div>

      <div id="save-msg" class="success-msg" style="display:none;margin-top:8px;">// sesión guardada correctamente</div>
      <div id="save-error" class="error-msg" style="display:none;margin-top:8px;"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="tab-historial" style="display:none;">
      <div class="flex-between" style="margin-bottom:1rem;">
        <span style="font-size:11px;color:var(--gray);font-family:var(--font-mono);" id="history-count"></span>
        <div style="display:flex;gap:8px;">
          <select id="history-cat-filter" onchange="renderHistory()" style="width:auto;font-size:12px;padding:5px 8px;">
            <option value="all">Todas</option>
            <option value="Empujes">Empujes</option>
            <option value="Tirones">Tirones</option>
            <option value="Pierna">Pierna</option>
            <option value="Torso">Torso</option>
            <option value="Cardio">Cardio</option>
          </select>
          <select id="history-filter" onchange="renderHistory()" style="width:auto;font-size:12px;padding:5px 8px;">
            <option value="all">Todos</option>
            <option value="mine">Solo yo</option>
          </select>
        </div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- PROGRESO -->
    <div id="tab-progreso" style="display:none;">
      <div class="section-title">Mis stats</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">Evolución de peso</div>
      <div class="card">
        <div style="display:flex;gap:8px;margin-bottom:1rem;">
          <select id="progress-exercise" onchange="updateChart()" style="flex:1;">
            <option value="">Selecciona ejercicio</option>
          </select>
          <select id="progress-user-filter" onchange="updateChart()" style="width:auto;">
            <option value="all">Todos</option>
            <option value="mine">Solo yo</option>
          </select>
        </div>
        <div class="chart-wrap"><canvas id="progress-chart"></canvas></div>
        <div id="chart-empty" class="empty" style="display:none;">// sin datos para este ejercicio</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="detail-modal" onclick="closeModal(event)">
  <div class="modal" id="detail-content"></div>
</div>

<script>
const SUPA_URL = 'https://oxssmfsmnqtexaushoeq.supabase.co';
const SUPA_KEY = 'sb_publishable_6OQBUpCEp4dJvBxMbFKtBw_FW94KXyS';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser=null, currentUsername='', workouts=[], exerciseCount=0, chartInstance=null, authMode='login', selectedCat=null;

const INTENSITY_LABELS = {1:'// muy suave',2:'// suave',3:'// suave-moderado',4:'// moderado bajo',5:'// moderado',6:'// moderado alto',7:'// intenso',8:'// muy intenso',9:'// casi máximo',10:'// máximo esfuerzo'};

async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await onLogin(session.user);
}

function updateIntensity(v) {
  document.getElementById('intensity-val').textContent = v;
  document.getElementById('intensity-desc').textContent = INTENSITY_LABELS[v] || '';
}

function selectCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('fuerza-form').style.display = cat !== 'Cardio' ? 'block' : 'none';
  document.getElementById('cardio-form').style.display = cat === 'Cardio' ? 'block' : 'none';
  if (cat !== 'Cardio' && document.getElementById('exercises-container').children.length === 0) {
    exerciseCount = 0;
    addExercise(); addExercise();
  }
}

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('auth-register-fields').style.display = mode==='register'?'block':'none';
  document.getElementById('auth-btn').textContent = mode==='login'?'ENTRAR':'CREAR CUENTA';
  document.getElementById('auth-error').textContent='';
  document.getElementById('auth-success').textContent='';
}

async function handleAuth() {
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-error');
  const sucEl=document.getElementById('auth-success');
  const btn=document.getElementById('auth-btn');
  errEl.textContent=''; sucEl.textContent='';
  if (!email||!password){errEl.textContent='// rellena email y contraseña';return;}
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span>${authMode==='login'?'ENTRANDO...':'CREANDO...'}`;
  if (authMode==='register') {
    const username=document.getElementById('reg-username').value.trim();
    if (!username){errEl.textContent='// pon un nombre de usuario';btn.disabled=false;btn.textContent='CREAR CUENTA';return;}
    const {data,error}=await sb.auth.signUp({email,password});
    if (error){errEl.textContent='// '+error.message;btn.disabled=false;btn.textContent='CREAR CUENTA';return;}
    if (data.user) await sb.from('profiles').insert({id:data.user.id,username});
    sucEl.textContent='// cuenta creada. ya puedes entrar.';
    btn.disabled=false; btn.textContent='CREAR CUENTA';
    switchAuthTab('login');
  } else {
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if (error){errEl.textContent='// email o contraseña incorrectos';btn.disabled=false;btn.textContent='ENTRAR';return;}
    await onLogin(data.user);
  }
}

async function onLogin(user) {
  currentUser=user;
  const {data:profile}=await sb.from('profiles').select('username').eq('id',user.id).single();
  currentUsername=profile?.username||user.email;
  document.getElementById('user-badge').textContent=currentUsername;
  document.getElementById('screen-auth').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('workout-date').value=new Date().toISOString().split('T')[0];
  await loadWorkouts();
}

async function logout() {
  await sb.auth.signOut();
  currentUser=null; workouts=[];
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-auth').classList.add('active');
  document.getElementById('auth-email').value='';
  document.getElementById('auth-password').value='';
  document.getElementById('exercises-container').innerHTML='';
  exerciseCount=0; selectedCat=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fuerza-form').style.display='none';
  document.getElementById('cardio-form').style.display='none';
}

async function loadWorkouts() {
  const {data,error}=await sb.from('workouts').select('*').order('date',{ascending:false});
  if (!error) workouts=data||[];
}

function showTab(name) {
  ['registro','historial','progreso'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
    document.getElementById('nav-'+t).classList.toggle('active',t===name);
  });
  if (name==='historial') renderHistory();
  if (name==='progreso') renderProgress();
}

function addExercise(data) {
  exerciseCount++;
  const id=exerciseCount;
  const div=document.createElement('div');
  div.className='card'; div.id='ex-'+id;
  div.innerHTML=`
    <div class="ex-name-row">
      <input type="text" placeholder="Nombre del ejercicio" id="ex-name-${id}" value="${data?data.name:''}">
      <button class="delete-x" onclick="document.getElementById('ex-${id}').remove()">×</button>
    </div>
    <div class="sets-header"><span></span><span>REPS</span><span>KG</span><span>RIR</span><span></span></div>
    <div id="sets-${id}"></div>
    <button class="btn btn-ghost btn-sm" onclick="addSet(${id})" style="margin-top:6px;width:100%;">+ serie</button>
  `;
  document.getElementById('exercises-container').appendChild(div);
  if (data&&data.sets) data.sets.forEach(s=>addSet(id,s));
  else addSet(id);
}

function addSet(exId,data) {
  const container=document.getElementById('sets-'+exId);
  const n=container.children.length+1;
  const row=document.createElement('div');
  row.className='set-row';
  row.innerHTML=`
    <div class="set-num">${n}</div>
    <input type="number" placeholder="—" min="1" id="reps-${exId}-${n}" value="${data?data.reps:''}">
    <input type="number" placeholder="—" min="0" step="0.5" id="weight-${exId}-${n}" value="${data?data.weight:''}">
    <input type="number" placeholder="—" min="0" max="10" id="rir-${exId}-${n}" value="${data?(data.rir||''):''}">
    <button class="delete-x" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(row);
}

async function saveWorkout() {
  if (!selectedCat) { document.getElementById('save-error').style.display='block'; document.getElementById('save-error').textContent='// selecciona el tipo de sesión'; return; }
  const date=document.getElementById('workout-date').value||new Date().toISOString().split('T')[0];
  const notes=document.getElementById('workout-notes').value.trim();
  let payload = { user_id:currentUser.id, name:selectedCat, date, category:selectedCat, notes };

  if (selectedCat === 'Cardio') {
    const tipo=document.getElementById('cardio-tipo').value;
    const duracion=document.getElementById('cardio-duracion').value;
    const distancia=document.getElementById('cardio-distancia').value;
    const intensidad=document.getElementById('cardio-intensidad').value;
    if (!duracion){document.getElementById('save-error').style.display='block';document.getElementById('save-error').textContent='// añade la duración';return;}
    payload.exercises = [];
    payload.cardio = { tipo, duracion:parseInt(duracion)||0, distancia:parseFloat(distancia)||0, intensidad:parseInt(intensidad) };
    const btn=document.getElementById('save-cardio-btn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>GUARDANDO...';
    const {error}=await sb.from('workouts').insert(payload);
    btn.disabled=false; btn.textContent='GUARDAR CARDIO';
    if (error){document.getElementById('save-error').style.display='block';document.getElementById('save-error').textContent='// error: '+error.message;return;}
  } else {
    const exercises=[];
    document.querySelectorAll('#exercises-container .card').forEach(card=>{
      const id=card.id.replace('ex-','');
      const exName=document.getElementById('ex-name-'+id)?.value.trim();
      if (!exName) return;
      const sets=[];
      card.querySelectorAll('.set-row').forEach((row,i)=>{
        const n=i+1;
        const reps=document.getElementById(`reps-${id}-${n}`)?.value;
        const weight=document.getElementById(`weight-${id}-${n}`)?.value;
        const rir=document.getElementById(`rir-${id}-${n}`)?.value;
        if (reps||weight) sets.push({reps:reps||'',weight:weight||'',rir:rir||''});
      });
      if (sets.length) exercises.push({name:exName,sets});
    });
    if (!exercises.length){document.getElementById('save-error').style.display='block';document.getElementById('save-error').textContent='// añade al menos un ejercicio con datos';return;}
    payload.exercises=exercises;
    const btn=document.getElementById('save-btn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>GUARDANDO...';
    const {error}=await sb.from('workouts').insert(payload);
    btn.disabled=false; btn.textContent='GUARDAR SESIÓN';
    if (error){document.getElementById('save-error').style.display='block';document.getElementById('save-error').textContent='// error: '+error.message;return;}
  }

  document.getElementById('save-error').style.display='none';
  document.getElementById('exercises-container').innerHTML='';
  document.getElementById('workout-notes').value='';
  document.getElementById('cardio-tipo').value='';
  document.getElementById('cardio-duracion').value='';
  document.getElementById('cardio-distancia').value='';
  document.getElementById('cardio-intensidad').value=5; updateIntensity(5);
  exerciseCount=0; selectedCat=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fuerza-form').style.display='none';
  document.getElementById('cardio-form').style.display='none';
  const msg=document.getElementById('save-msg');
  msg.style.display='block'; setTimeout(()=>msg.style.display='none',2500);
  await loadWorkouts();
}

function renderHistory() {
  const catFilter=document.getElementById('history-cat-filter').value;
  const userFilter=document.getElementById('history-filter').value;
  let filtered=workouts;
  if (catFilter!=='all') filtered=filtered.filter(w=>w.category===catFilter||w.name===catFilter);
  if (userFilter==='mine') filtered=filtered.filter(w=>w.user_id===currentUser.id);
  document.getElementById('history-count').textContent=`// ${filtered.length} sesiones`;
  const list=document.getElementById('history-list');
  if (!filtered.length){list.innerHTML='<div class="empty">// sin sesiones registradas</div>';return;}
  list.innerHTML=filtered.map(w=>{
    const isMe=w.user_id===currentUser.id;
    const isCardio=w.category==='Cardio'||w.name==='Cardio';
    const badgeClass=isCardio?'cat-badge cat-badge-cardio':'cat-badge cat-badge-fuerza';
    const catName=w.category||w.name||'—';
    let metaExtra='';
    if (isCardio&&w.cardio) metaExtra=` · ${w.cardio.duracion}min · int. ${w.cardio.intensidad}/10`;
    else metaExtra=` · ${(w.exercises||[]).reduce((a,e)=>a+e.sets.length,0)} series`;
    return `<div class="card workout-card" onclick="showDetail('${w.id}')">
      <div class="workout-card-header">
        <div>
          <span class="${badgeClass}">${catName.toUpperCase()}</span>
          ${!isMe?'<span class="companion-badge">compañero</span>':''}
          <div class="workout-meta">${formatDate(w.date)}${metaExtra}</div>
        </div>
        ${isMe?`<button class="btn btn-sm btn-danger" onclick="deleteWorkout(event,'${w.id}')">borrar</button>`:''}
      </div>
      ${isCardio&&w.cardio?`<span class="tag tag-cardio">${w.cardio.tipo||'cardio'}</span>`:
        (w.exercises||[]).slice(0,4).map(e=>`<span class="tag">${e.name}</span>`).join('')}
      ${w.notes?`<div style="font-size:12px;color:var(--gray);font-family:var(--font-mono);margin-top:8px;font-style:italic;">"${w.notes}"</div>`:''}
    </div>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day]=d.split('-');
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

async function deleteWorkout(event,id) {
  event.stopPropagation();
  if (!confirm('¿Borrar esta sesión?')) return;
  await sb.from('workouts').delete().eq('id',id);
  await loadWorkouts(); renderHistory();
}

function showDetail(id) {
  const w=workouts.find(x=>String(x.id)===String(id));
  if (!w) return;
  const isMe=w.user_id===currentUser.id;
  const isCardio=w.category==='Cardio'||w.name==='Cardio';
  let body='';
  if (isCardio&&w.cardio) {
    body=`<div class="cardio-detail-grid">
      <div class="cardio-detail-box"><div class="cardio-detail-label">Duración</div><div class="cardio-detail-val">${w.cardio.duracion}<span style="font-size:14px;color:var(--gray);">min</span></div></div>
      <div class="cardio-detail-box"><div class="cardio-detail-label">Distancia</div><div class="cardio-detail-val">${w.cardio.distancia||'—'}<span style="font-size:14px;color:var(--gray);">${w.cardio.distancia?'km':''}</span></div></div>
      <div class="cardio-detail-box"><div class="cardio-detail-label">Intensidad</div><div class="cardio-detail-val">${w.cardio.intensidad}<span style="font-size:14px;color:var(--gray);">/10</span></div></div>
    </div>
    ${w.cardio.tipo?`<div style="font-size:13px;color:var(--gray);font-family:var(--font-mono);margin-top:4px;">Tipo: ${w.cardio.tipo}</div>`:''}`;
  } else {
    body=(w.exercises||[]).map(e=>`
      <div class="ex-section-title">${e.name}</div>
      <table class="detail-table">
        <thead><tr><th>#</th><th>Reps</th><th>Peso (kg)</th><th>RIR</th></tr></thead>
        <tbody>${e.sets.map((s,j)=>`<tr><td>${j+1}</td><td>${s.reps||'—'}</td><td>${s.weight||'—'}</td><td>${s.rir||'—'}</td></tr>`).join('')}</tbody>
      </table>`).join('');
  }
  document.getElementById('detail-content').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-title">${(w.category||w.name||'').toUpperCase()}${!isMe?'<span class="companion-badge">compañero</span>':''}</div>
    <div style="font-size:11px;color:var(--gray);font-family:var(--font-mono);margin-bottom:1rem;">${formatDate(w.date)}</div>
    ${body}
    ${w.notes?`<div style="font-size:13px;color:var(--gray);font-family:var(--font-mono);margin-top:12px;padding:10px;background:var(--off);border-radius:8px;font-style:italic;">"${w.notes}"</div>`:''}
    <button class="btn btn-full" style="margin-top:1.5rem;" onclick="closeModal()">CERRAR</button>
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal(event) {
  if (!event||event.target===document.getElementById('detail-modal'))
    document.getElementById('detail-modal').classList.remove('open');
}

function renderProgress() {
  const mine=workouts.filter(w=>w.user_id===currentUser.id);
  const fuerzaWorkouts=mine.filter(w=>w.category!=='Cardio'&&w.name!=='Cardio');
  const cardioWorkouts=mine.filter(w=>w.category==='Cardio'||w.name==='Cardio');
  const allEx=[...new Set(fuerzaWorkouts.flatMap(w=>(w.exercises||[]).map(e=>e.name)))].sort();
  document.getElementById('progress-exercise').innerHTML=
    '<option value="">Selecciona ejercicio</option>'+allEx.map(e=>`<option value="${e}">${e}</option>`).join('');
  const totalSets=fuerzaWorkouts.reduce((a,w)=>a+(w.exercises||[]).reduce((b,e)=>b+e.sets.length,0),0);
  const allWeights=fuerzaWorkouts.flatMap(w=>(w.exercises||[]).flatMap(e=>e.sets.map(s=>parseFloat(s.weight)||0))).filter(x=>x>0);
  const maxW=allWeights.length?Math.max(...allWeights):0;
  const totalCardioMin=cardioWorkouts.reduce((a,w)=>a+(w.cardio?.duracion||0),0);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Sesiones fuerza</div><div class="stat-value">${fuerzaWorkouts.length}</div></div>
    <div class="stat-card"><div class="stat-label">Sesiones cardio</div><div class="stat-value">${cardioWorkouts.length}</div></div>
    <div class="stat-card"><div class="stat-label">Series totales</div><div class="stat-value">${totalSets}</div></div>
    <div class="stat-card"><div class="stat-label">Cardio total</div><div class="stat-value">${totalCardioMin}<span class="stat-unit">min</span></div></div>
  `;
  updateChart();
}

function updateChart() {
  const exName=document.getElementById('progress-exercise').value;
  const userFilter=document.getElementById('progress-user-filter').value;
  const ctx=document.getElementById('progress-chart');
  const empty=document.getElementById('chart-empty');
  if (chartInstance){chartInstance.destroy();chartInstance=null;}
  if (!exName){ctx.style.display='none';empty.style.display='none';return;}
  const filtered=userFilter==='mine'?workouts.filter(w=>w.user_id===currentUser.id):workouts;
  const points=[];
  filtered.slice().reverse().forEach(w=>{
    (w.exercises||[]).filter(e=>e.name===exName).forEach(e=>{
      const ws=e.sets.map(s=>parseFloat(s.weight)||0).filter(x=>x>0);
      if (ws.length) points.push({date:w.date,max:Math.max(...ws),isMe:w.user_id===currentUser.id});
    });
  });
  if (!points.length){ctx.style.display='none';empty.style.display='block';return;}
  ctx.style.display='block';empty.style.display='none';
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{
      labels:points.map(d=>formatDate(d.date)),
      datasets:[{
        label:'Peso máx. (kg)',data:points.map(d=>d.max),
        borderColor:'#1a3bcc',backgroundColor:'rgba(26,59,204,0.07)',
        pointBackgroundColor:points.map(d=>d.isMe?'#1a3bcc':'#16a34a'),
        pointBorderColor:'transparent',tension:0.35,fill:true,pointRadius:5,borderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#9ca3af',font:{size:10,family:'DM Mono'}},grid:{color:'rgba(0,0,0,0.05)'}},
        y:{ticks:{color:'#9ca3af',font:{size:10,family:'DM Mono'}},grid:{color:'rgba(0,0,0,0.05)'},beginAtZero:false}
      }
    }
  });
}

init();
</script>
</body>
</html>
